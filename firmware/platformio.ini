; Pyramid firmware — PlatformIO project (from v1.1; v0 was built in the Arduino IDE).
;
;   pio run                 # compile the AtomS3R firmware
;   pio run -t upload       # flash the board
;   pio device monitor      # serial monitor @115200
;   pio test -e native      # host-side unit tests (pure logic)
;
; Copy src/config.example.h -> src/config.h first (config.h is gitignored).

[platformio]
default_envs = atoms3r

; --- AtomS3R (ESP32-S3) firmware -------------------------------------------
; No built-in AtomS3R board def; the ESP32-S3 devkit profile compiles fine and
; M5Unified detects the actual board (AtomS3R + Echo Base) at runtime.
[env:atoms3r]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    m5stack/M5Unified@^0.2.0
    bblanchon/ArduinoJson@^7.0.0
    links2004/WebSockets@^2.6.1   ; WSS client to our server (v2.1)

; --- Host (native) unit tests ----------------------------------------------
; Pure, Arduino-free logic (line reader, text_in parser, chat_api, history,
; backoff, SSE decode) runs on the host. See PYR-005.
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -I src
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
