# Root project config for the Python server + tests (v2+).
# The firmware is built with PlatformIO (see firmware/), not this file.

[tool.pytest.ini_options]
# Tests live in /tests; the server package lives in /server.
pythonpath = ["server"]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["server", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E501"]  # line length handled by formatter; prose lines in docstrings
